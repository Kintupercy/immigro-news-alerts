name: Deploy Supabase edge functions

# Auto-deploys any edge function whose source changed on push to main.
# Migrations are NOT auto-applied — those still go through Supabase MCP +
# Board approval per IMMIGRO_OPS.md §6.
#
# Required secret: SUPABASE_ACCESS_TOKEN
#   Create at https://supabase.com/dashboard/account/tokens (scope: full),
#   then add as a repo secret in Settings → Secrets and variables → Actions.

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-edge-functions.yml"
  workflow_dispatch:
    inputs:
      function_name:
        description: "Optional: specific function to redeploy (deploys ALL changed functions otherwise)"
        required: false
        type: string

concurrency:
  group: deploy-edge-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_PROJECT_REF: xybpgorbkiaitimxiqej

    steps:
      - name: Checkout (with previous commit for diffing)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Verify SUPABASE_ACCESS_TOKEN is configured
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            cat <<EOF
          ::error::SUPABASE_ACCESS_TOKEN secret is not configured.
          ::error::Create a token at https://supabase.com/dashboard/account/tokens
          ::error::then add it as a repository secret named SUPABASE_ACCESS_TOKEN.
          EOF
            exit 1
          fi

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Determine which functions to deploy
        id: changed
        run: |
          set -euo pipefail
          override="${{ github.event.inputs.function_name || '' }}"
          if [ -n "$override" ]; then
            echo "Manual override: deploying only '$override'"
            echo "fns=$override" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Diff vs. previous commit on main; collect unique function dirs touched.
          # awk's filter (NF>=3) already drops empty lines, so a redundant grep
          # would break under `pipefail` when the diff is empty (grep returns 1
          # on no-match). Keep the pipeline minimal.
          changed=$(
            git diff --name-only HEAD~1 HEAD -- 'supabase/functions/' \
              | awk -F/ '/^supabase\/functions\// && NF>=3 {print $3}' \
              | sort -u \
              | tr '\n' ' '
          )
          echo "Changed functions: ${changed:-(none)}"
          echo "fns=$changed" >> "$GITHUB_OUTPUT"

      - name: Deploy changed functions
        if: steps.changed.outputs.fns != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          fns="${{ steps.changed.outputs.fns }}"
          failed=()
          deployed=()

          for fn in $fns; do
            if [ ! -d "supabase/functions/$fn" ]; then
              echo "::warning::Skipping '$fn' — directory not found (likely deleted in this commit)"
              continue
            fi
            echo "::group::Deploying $fn"
            if supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"; then
              deployed+=("$fn")
              echo "::endgroup::"
            else
              failed+=("$fn")
              echo "::endgroup::"
              echo "::error::Failed to deploy $fn"
            fi
          done

          echo ""
          echo "===== Deploy summary ====="
          echo "Deployed: ${deployed[*]:-(none)}"
          echo "Failed:   ${failed[*]:-(none)}"

          if [ "${#failed[@]}" -gt 0 ]; then
            exit 1
          fi

      - name: No changes to deploy
        if: steps.changed.outputs.fns == ''
        run: echo "No edge functions changed in this push; nothing to deploy."
