
<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon - Globe Icon -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Language and Geo targeting (static — do not duplicate in React Helmet) -->
    <meta name="language" content="English">
    <meta http-equiv="content-language" content="en-US">
    <meta name="geo.region" content="US">
    <meta name="geo.country" content="US">

    <!-- Theme and App (static — not managed by React Helmet) -->
    <meta name="theme-color" content="#1e3a8a">
    <meta name="msapplication-TileColor" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ImmigroNews">

    <!--
      All per-page meta tags (title, description, keywords, canonical, og:*, twitter:*)
      are injected by react-helmet-async in each page component.
      Keeping static copies here would create duplicates in the prerendered HTML.
    -->

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://www.google-analytics.com">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Enhanced Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ImmigroNews",
      "alternateName": "Immigro News",
      "url": "https://immigronews.com",
      "description": "Latest immigration news, visa updates, and legal assistance platform",
      "publisher": {
        "@type": "Organization",
        "name": "ImmigroNews",
        "url": "https://immigronews.com",
        "logo": {
          "@type": "ImageObject",
          "url": "https://immigronews.com/logo.png",
          "width": 512,
          "height": 512
        },
        "sameAs": [
          "https://twitter.com/ImmigroNews"
        ]
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://immigronews.com/news?q={search_term_string}",
        "query-input": "required name=search_term_string"
      },
      "mainEntity": {
        "@type": "NewsMediaOrganization",
        "name": "ImmigroNews",
        "url": "https://immigronews.com",
        "description": "Trusted source for immigration news and legal assistance"
      }
    }
    </script>
    
    <!-- Organization Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ImmigroNews",
      "url": "https://immigronews.com",
      "logo": "https://immigronews.com/logo.png",
      "description": "Leading platform for immigration news, visa updates, and legal assistance",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "email": "support@immigronews.com",
        "availableLanguage": ["English", "Spanish"]
      },
      "sameAs": [
        "https://twitter.com/ImmigroNews",
        "https://instagram.com/ImmigroNews",
        "https://tiktok.com/@ImmigroNews"
      ]
    }
    </script>
    
    <!-- FAQPage schema is rendered dynamically on /faq with all 44+ Q&A pairs -->
    
    <!-- Google Search Console Verification - Add your verification code -->
    <!-- <meta name="google-site-verification" content="YOUR_VERIFICATION_CODE" /> -->
    
    <!-- Bing Webmaster Tools Verification - Add your verification code -->
    <!-- <meta name="msvalidate.01" content="YOUR_VERIFICATION_CODE" /> -->

      });
    </script>
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
